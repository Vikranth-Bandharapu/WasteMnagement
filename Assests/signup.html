<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sign up for an EcoWaste Solutions portal account to manage collections, track dumpsters, and view sustainability metrics.">
<title>Register Account | EcoWaste Solutions</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}
html, body {
    width: 100%;
    min-height: 100vh;
    overflow-x: hidden;
}
body {
    display: flex;
    flex-direction: column;
    background:
        radial-gradient(circle at top left, rgba(16, 185, 129, 0.08), transparent 35%),
        radial-gradient(circle at bottom right, rgba(9, 90, 59, 0.08), transparent 35%),
        linear-gradient(135deg, #070b12, #0d2218, #05080e);
}

/* Dot grid */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #10b981 1px, transparent 1px);
    background-size: 42px 42px;
    opacity: .05;
    z-index: 0;
    pointer-events: none;
}

/* ── HEADER ── */
header {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    max-width: 1250px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 1000;
    overflow: hidden;
}
header::before {
    content: "";
    position: absolute;
    inset: -2px;
    background: linear-gradient(120deg, transparent, rgba(16, 185, 129, 0.4), transparent);
    opacity: .4;
    animation: borderGlow 6s linear infinite;
    pointer-events: none;
}
@keyframes borderGlow {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

.logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1.5rem;
    font-weight: 800;
    color: #10b981;
    text-decoration: none;
}
.logo i {
    font-size: 1.75rem;
}

nav { display: flex; gap: 32px; z-index: 2; }
nav a {
    color: white; text-decoration: none;
    font-size: 16px; opacity: .8; font-weight: 600;
    position: relative; transition: 0.3s;
}
nav a::after {
    content: "";
    position: absolute;
    bottom: -5px; left: 0;
    width: 0%; height: 2px;
    background: #10b981; transition: 0.3s;
}
nav a:hover::after { width: 100%; }
nav a:hover { opacity: 1; transform: translateY(-2px); }
.right { display: flex; align-items: center; gap: 18px; z-index: 2; }
.login-nav {
    color: white; text-decoration: none;
    font-size: 16px; opacity: .9; font-weight: 600;
}
.signup-btn-nav {
    padding: 10px 22px;
    border-radius: 30px;
    background: rgba(255,255,255,0.08);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    text-decoration: none;
    font-size: 16px; font-weight: 600;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}
.signup-btn-nav:hover {
    background: #10b981;
    border-color: #10b981;
    transform: translateY(-2px);
}
.hamburger {
    display: none;
    width: 28px; height: 20px;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer; z-index: 1001;
    align-self: center;
}
.hamburger span {
    height: 3px; width: 100%;
    background: white; border-radius: 3px; transition: .4s;
}
.hamburger.active span:nth-child(1) { transform: rotate(45deg) translateY(8px); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: rotate(-45deg) translateY(-8px); }
.mobile-menu {
    position: fixed; inset: 0;
    background: rgba(8, 14, 11, 0.98);
    backdrop-filter: blur(25px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 30px; opacity: 0; pointer-events: none;
    transition: .5s; z-index: 999;
}
.mobile-menu.active { opacity: 1; pointer-events: auto; }
.mobile-menu a {
    color: white; font-size: 28px; font-weight: 600;
    text-decoration: none; opacity: 0;
    transform: translateY(40px); transition: all 0.5s;
}
.mobile-menu.active a { opacity: 1; transform: translateY(0); }
.mobile-menu.active a:nth-child(1){transition-delay:.1s}
.mobile-menu.active a:nth-child(2){transition-delay:.2s}
.mobile-menu.active a:nth-child(3){transition-delay:.3s}
.mobile-menu.active a:nth-child(4){transition-delay:.4s}
.mobile-menu.active a:nth-child(5){transition-delay:.5s}
.mobile-menu.active a:nth-child(6){transition-delay:.6s}
.mobile-menu.active a:nth-child(7){transition-delay:.7s}
@media(max-width:1024px){
    nav, .right { display: none; }
    .hamburger { display: flex; }
}

/* ── MAIN WRAPPER ── */
.auth-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 140px 20px 80px;
    position: relative;
    z-index: 2;
}

/* ── CARD ── */
.signup-card {
    width: 420px;
    max-width: 95vw;
    background: rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 24px;
    border: 1px solid rgba(16, 185, 129, 0.15);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(16, 185, 129, 0.05);
    padding: 40px 36px;
    text-align: center;
    transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
}
.signup-card:hover {
    transform: translateY(-6px);
    border-color: rgba(16, 185, 129, 0.35);
    box-shadow: 0 30px 70px rgba(0,0,0,0.6), 0 0 40px rgba(16, 185, 129, 0.12);
}

/* ── PROFILE ICON ── */
.user-icon {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(16, 185, 129, 0.15), rgba(9, 90, 59, 0.08));
    border: 2px solid rgba(16, 185, 129, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: #10b981;
    margin: 0 auto 22px;
    box-shadow:
        0 0 0 6px rgba(16, 185, 129, 0.07),
        0 8px 28px rgba(9, 90, 59, 0.25);
    transition: all 0.4s ease;
}
.signup-card:hover .user-icon {
    transform: scale(1.08);
    border-color: rgba(16, 185, 129, 0.65);
    box-shadow:
        0 0 0 10px rgba(16, 185, 129, 0.09),
        0 12px 36px rgba(9, 90, 59, 0.38);
}

.signup-card h2 {
    color: white;
    font-size: 22px;
    margin-bottom: 28px;
    font-weight: 700;
    letter-spacing: 0.4px;
}

/* ── INPUT GROUPS ── */
.input-group {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(16, 185, 129, 0.15);
    margin-bottom: 16px;
    border-radius: 30px;
    overflow: hidden;
    transition: all 0.3s ease;
}
.input-group:focus-within {
    border-color: #10b981;
    box-shadow: 0 0 12px rgba(16, 185, 129, 0.25);
    background: rgba(255,255,255,0.06);
}
.input-group.invalid {
    border-color: #ff4a4a !important;
    box-shadow: 0 0 10px rgba(255,74,74,0.22) !important;
}
.input-group i {
    padding: 14px 16px;
    color: #10b981;
    font-size: 15px;
    width: 48px;
    text-align: center;
    flex-shrink: 0;
}
.input-group i.toggle-password {
    cursor: pointer;
    user-select: none;
    transition: color 0.3s;
}
.input-group i.toggle-password:hover {
    color: white;
}
.input-group input {
    border: none; outline: none;
    padding: 14px 16px 14px 0;
    background: transparent;
    color: white;
    flex: 1;
    font-size: 14px;
}
.input-group input::placeholder { color: rgba(255,255,255,0.35); }

.error-msg {
    color: #ff6b6b;
    font-size: 12px;
    text-align: left;
    margin: -10px 0 12px 18px;
    display: none;
}

.options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 20px;
    padding: 0 4px;
}
.options label { display: flex; align-items: center; gap: 7px; cursor: pointer; }

/* ── SIGN UP BUTTON ── */
.signup-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(90deg, #095a3b, #10b981);
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(9, 90, 59, 0.3);
    transition: all 0.3s ease;
    margin-top: 6px;
}
.signup-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(16, 185, 129, 0.45);
}

.login-link {
    margin-top: 18px;
    font-size: 14px;
    color: rgba(255,255,255,0.7);
}
.login-link a {
    color: #10b981;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s;
}
.login-link a:hover { color: white; }

/* ── FOOTER ── */
.site-footer {
    background: #06090e;
    color: #cbd5e1;
    padding: 60px 8% 30px;
    position: relative;
    z-index: 2;
    border-top: 1px solid rgba(16, 185, 129, 0.12);
}
.footer-container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 40px;
    margin-bottom: 40px;
}
.footer-col h3 { color: white; margin-bottom: 16px; font-size: 16px; }
.footer-col p { line-height: 1.6; font-size: 14px; }
.footer-logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1.75rem;
    font-weight: 800;
    color: #10b981;
    text-decoration: none;
    margin-bottom: 14px;
}
.footer-logo i {
    font-size: 2rem;
}
.footer-col ul { list-style: none; padding: 0; }
.footer-col ul li { margin-bottom: 10px; }
.footer-col ul li a { text-decoration: none; color: #cbd5e1; transition: .3s; font-size: 14px; }
.footer-col ul li a:hover { color: #10b981; }
.social-icons { display: flex; gap: 12px; margin-top: 10px; }
.social-icons a {
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    background: #111827; border-radius: 10px;
    color: white; font-size: 17px; transition: .3s;
}
.social-icons a:hover { background: #10b981; }
.footer-bottom {
    border-top: 1px solid rgba(255,255,255,.05);
    padding-top: 20px;
    font-size: 14px;
    color: #94a3b8;
}
@media(max-width:900px){
    .footer-container { grid-template-columns: 1fr 1fr; gap: 28px; text-align: center; }
    .footer-col { display: flex; flex-direction: column; align-items: center; }
    .social-icons { justify-content: center; }
    .footer-bottom { text-align: center; }
}
@media(max-width:600px){
    .footer-container { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<main class="auth-wrap">
    <div class="signup-card">

        <!-- Profile icon inside the card, normal flow -->
        <div class="user-icon">
            <i class="fa-regular fa-user"></i>
        </div>

        <h2>Register EcoWaste Account</h2>

        <form id="signupForm" novalidate>
            <div class="input-group" id="nameGroup">
                <i class="fa fa-user"></i>
                <input type="text" id="fullname" placeholder="Full Name" required>
            </div>
            <div class="error-msg" id="nameError">Full name is required.</div>

            <div class="input-group" id="emailGroup">
                <i class="fa fa-envelope"></i>
                <input type="email" id="email" placeholder="Email ID" required>
            </div>
            <div class="error-msg" id="emailError">Please enter a valid email address.</div>

            <div class="input-group" id="passGroup">
                <i class="fa fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
                <i class="fa-regular fa-eye-slash toggle-password" id="togglePassword"></i>
            </div>
            <div class="error-msg" id="passwordError">Password must be at least 6 characters.</div>

            <div class="input-group" id="confirmGroup">
                <i class="fa fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <i class="fa-regular fa-eye-slash toggle-password" id="toggleConfirmPassword"></i>
            </div>
            <div class="error-msg" id="confirmPasswordError">Passwords do not match.</div>

            <div class="options">
                <label>
                    <input type="checkbox" id="terms"> I agree to the Terms & Conditions
                </label>
            </div>
            <div class="error-msg" id="termsError" style="margin-top: -12px; margin-bottom: 16px;">You must accept the terms & conditions to proceed.</div>

            <button type="submit" class="signup-btn">SIGN UP</button>

            <div class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </form>

    </div>
</main>


<script>
    // Hamburger
    const hamburger = document.getElementById("hamburger");
    const menu = document.getElementById("mobileMenu");
    if (hamburger && menu) {
        hamburger.onclick = () => {
            hamburger.classList.toggle("active");
            menu.classList.toggle("active");
        };
    }

    // Form validation
    document.getElementById("signupForm").addEventListener("submit", function(e) {
        e.preventDefault();
        let valid = true;

        const groups = ['nameGroup','emailGroup','passGroup','confirmGroup'];
        const errors = ['nameError','emailError','passwordError','confirmPasswordError','termsError'];
        groups.forEach(id => document.getElementById(id).classList.remove('invalid'));
        errors.forEach(id => document.getElementById(id).style.display = 'none');

        const name    = document.getElementById("fullname").value.trim();
        const email   = document.getElementById("email").value.trim();
        const pass    = document.getElementById("password").value.trim();
        const confirm = document.getElementById("confirmPassword").value.trim();

        if (!name) {
            document.getElementById("nameGroup").classList.add("invalid");
            document.getElementById("nameError").style.display = "block";
            valid = false;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            document.getElementById("emailGroup").classList.add("invalid");
            document.getElementById("emailError").style.display = "block";
            valid = false;
        }
        if (pass.length < 6) {
            document.getElementById("passGroup").classList.add("invalid");
            document.getElementById("passwordError").style.display = "block";
            valid = false;
        }
        if (!confirm || confirm !== pass) {
            document.getElementById("confirmGroup").classList.add("invalid");
            document.getElementById("confirmPasswordError").style.display = "block";
            valid = false;
        }
        if (!document.getElementById("terms").checked) {
            document.getElementById("termsError").style.display = "block";
            valid = false;
        }

        if (valid) window.location.href = "login.html";
    });

    // Toggle password visibility
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    togglePassword.addEventListener("click", function () {
        const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
        passwordInput.setAttribute("type", type);
        this.classList.toggle("fa-eye");
        this.classList.toggle("fa-eye-slash");
    });

    const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    toggleConfirmPassword.addEventListener("click", function () {
        const type = confirmPasswordInput.getAttribute("type") === "password" ? "text" : "password";
        confirmPasswordInput.setAttribute("type", type);
        this.classList.toggle("fa-eye");
        this.classList.toggle("fa-eye-slash");
    });
</script>

</body>
</html>
